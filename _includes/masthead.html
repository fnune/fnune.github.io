<header class="masthead">
  <a class="masthead-brand" href="/">
    <span class="masthead-mark" aria-hidden="true"></span>
    <span class="masthead-title">{{ site.author.name }}<span class="masthead-suffix">'s blog</span></span>
  </a>
  <nav class="masthead-nav">
    <span class="theme-switch" role="radiogroup" aria-label="Theme">
      <button type="button" class="theme-option" role="radio" aria-checked="false" data-theme-value="system">System</button>
      <span class="theme-sep" aria-hidden="true">|</span>
      <button type="button" class="theme-option" role="radio" aria-checked="false" data-theme-value="light">Light</button>
      <span class="theme-sep" aria-hidden="true">|</span>
      <button type="button" class="theme-option" role="radio" aria-checked="false" data-theme-value="dark">Dark</button>
    </span>
    <a href="/atom.xml">RSS</a>
  </nav>
</header>
