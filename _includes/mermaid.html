<script type="module">
  if (document.querySelector('.mermaid')) {
    const { default: mermaid } = await import('https://cdn.jsdelivr.net/npm/mermaid@11.12.0/+esm');
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      fontFamily: "'Clear Sans', sans-serif",
      themeVariables: {
        fontFamily: "'Clear Sans', sans-serif",
        primaryColor: '#eeeded',
        primaryTextColor: '#000000',
        primaryBorderColor: '#d6d3d3',
        lineColor: '#1d70b8',
        secondaryColor: '#ffffff',
        tertiaryColor: '#ffffff',
      },
    });
  }
</script>
