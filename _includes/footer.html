<footer class="colophon">
  <p>{{ site.author.description }}</p>
</footer>

<script>
  (function () {
    var group = document.querySelector('.theme-switch');
    if (!group) return;
    var options = group.querySelectorAll('.theme-option');
    function stored() {
      try {
        var v = localStorage.getItem('theme');
        return v === 'light' || v === 'dark' ? v : 'system';
      } catch (e) {
        return 'system';
      }
    }
    function apply(mode) {
      if (mode === 'system') {
        document.documentElement.removeAttribute('data-theme');
        try { localStorage.removeItem('theme'); } catch (e) {}
      } else {
        document.documentElement.setAttribute('data-theme', mode);
        try { localStorage.setItem('theme', mode); } catch (e) {}
      }
    }
    function render() {
      var current = stored();
      options.forEach(function (option) {
        var on = option.getAttribute('data-theme-value') === current;
        option.setAttribute('aria-checked', on ? 'true' : 'false');
      });
    }
    options.forEach(function (option) {
      option.addEventListener('click', function () {
        apply(option.getAttribute('data-theme-value'));
        render();
      });
    });
    render();
  })();
</script>
